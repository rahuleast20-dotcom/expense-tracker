<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>
<body class="bg-light">

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fs-3 fw-bold">
            Expense Tracker
        </span>
    </div>
</nav>

<!-- ================= SUCCESS MESSAGE ================= -->

<div class="container mt-3">
    <div class="alert alert-success alert-dismissible fade show"
         th:if="${successMessage}"
         role="alert">
        <strong>Success!</strong>
        <span th:text="${successMessage}"></span>
        <button class="btn-close"
                data-bs-dismiss="alert">
        </button>
    </div>
</div>

<!-- ================= DASHBOARD ================= -->

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4 mb-3">
            <div class="card shadow border-primary">
                <div class="card-body text-center">
                    <h5>Total Expenses</h5>
                    <h2 class="text-primary"
                        th:text="${totalItems}">
                    </h2>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card shadow border-success">
                <div class="card-body text-center">
                    <h5>Total Spending</h5>
                    <h2 class="text-success">
                        ₹
                        <span th:text="${#numbers.formatDecimal(totalSpending,1,2)}"> </span>
                    </h2>
                </div>
            </div>
        </div>		
		<div class="col-md-4 mb-3">
		    <div class="card shadow border-warning">
		        <div class="card-body text-center">
		            <h5>Top Category</h5>
		            <h3 class="text-warning"
		                th:text="${topCategory}">
		            </h3>
		        </div>
		    </div>
		</div>
    </div>
</div>

<!-- ================= FORM + TABLE ================= -->

<div class="container mt-4">
    <div class="row justify-content-center">
        <!-- ================= LEFT FORM ================= -->
        <div class="col-lg-6 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 th:text="${expense.id == null ? 'Add Expense' : 'Edit Expense'}"></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/save}"
                          th:object="${expense}"
                          method="post">
                        <input type="hidden"
                               th:field="*{id}">
                        <!-- Title -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Expense Title
                            </label>
                            <input
                                    class="form-control"
                                    th:field="*{title}"
                                    placeholder="Enter Expense Title">
                            <div class="text-danger"
                                 th:errors="*{title}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Expense Date
                            </label>
                            <input
                                    type="number"
                                    class="form-control"
                                    min="1"
                                    max="31"
                                    th:field="*{day}"
                                    placeholder="1 - 31">
                            <div class="text-danger"
                                 th:errors="*{day}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Amount (₹)
                            </label>
                            <input
                                    type="number"
                                    step="0.01"
                                    class="form-control"
                                    th:field="*{amount}"
                                    placeholder="Enter Amount">
                            <div class="text-danger"
                                 th:errors="*{amount}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Category
                            </label>
							<select class="form-select"
							        th:field="*{category}">
							    <option value="">Select Category</option>
							    <option value="Vehicle">Vehicle</option>
								<option value="Rent Expense">Rent Expense</option>
							    <option value="EMI">EMI</option>
							    <option value="Insurance">Insurance</option>
							    <option value="Household">Household</option>
							    <option value="Travel">Travel</option>
							    <option value="Others">Others</option>
							</select>
                            <div class="text-danger"
                                 th:errors="*{category}">
                            </div>
                        </div>
                        <button
                                class="btn btn-success w-100">
                            <span th:text="${expense.id == null ? 'Save Expense' : 'Update Expense'}"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ================= CATEGORY SUMMARY ================= -->
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-warning">
            <h4 class="mb-0">
                Category Summary
            </h4>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>Category</th>
                    <th class="text-end">Total Amount (₹)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${categorySummary}">
                    <td th:text="${entry.key}"></td>
                    <td class="text-end">
                        ₹
                        <span th:text="${#numbers.formatDecimal(entry.value,1,2)}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="container mt-4">
    <form th:action="@{/}" method="get">
        <div class="row">
            <div class="col-md-6">
                <input
                        type="text"
                        class="form-control"
                        name="keyword"
                        placeholder="Search Expense"
                        th:value="${keyword}">
            </div>
           <div class="col-md-4">
                <select class="form-select"name="category">
                    <option value="All">All Categories</option>
                    <option value="Vehicle"th:selected="${category=='Vehicle'}">Vehicle</option>
                    <option value="Rent Expense"th:selected="${category=='Rent Expense'}">Rent Expense</option>
                    <option value="EMI"th:selected="${category=='EMI'}">EMI</option>
					<option value="Insurance"th:selected="${category=='Insurance'}">Insurance</option>
					<option value="Household"th:selected="${category=='Household'}">Household</option>
					<option value="Travel"th:selected="${category=='Travel'}">Travel</option>
					<option value="Others"th:selected="${category=='Others'}">Others</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100"> Search</button>
            </div>
        </div>
    </form>
</div>

 
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <div class="d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Expense List</h4>
                <span class="badge bg-light text-dark"
                      th:text="${totalItems} + ' Records'">
                </span>
            </div>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
               <thead class="table-light">
                <tr>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th class="text-end">Amount</th>
                    <th class="text-center">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="expense : ${expenses}">
                    <td th:text="${expense.title}"></td>
                    <td>
                        <span class="badge bg-secondary"
                              th:text="${expense.category}"></span>
                    </td>
                    <td th:text="${expense.day}"></td>
                    <td class="text-end">
                        ₹
                        <span th:text="${#numbers.formatDecimal(expense.amount,1,2)}"> </span>
                    </td>
                    <td class="text-center">
                        <a class="btn btn-warning btn-sm"
                           th:href="@{/edit/{id}(id=${expense.id})}">
                            Edit
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
